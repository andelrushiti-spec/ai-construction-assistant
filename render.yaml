services:
  - type: web
    name: construction-legal-assistant
    env: python
    # "free" plan has ephemeral storage — the SQLite DB, uploads, and vector
    # indexes are wiped on every restart.  A persistent disk requires at least
    # the "starter" plan ($7/mo) or higher.  Set the plan to "starter" (or
    # above) and uncomment the "disks" block below to persist all data.
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --workers=1 --bind=0.0.0.0:$PORT "backend.app:create_app()"
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: SECRET_KEY
        # Set this ONCE manually in the Render dashboard.  generateValue would
        # create a new key on every deploy, invalidating all session cookies.
        sync: false
      - key: DEBUG
        value: "False"
      - key: PERSISTENT_VOLUME_PATH
        value: /mnt/data
    disks:
      - name: construction-data
        mountPath: /mnt/data
        sizeGB: 10
